<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 280" fill="none">
  <!-- Definiciones -->
  <defs>
    <linearGradient id="goldMain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C49A3C"/>
      <stop offset="50%" stop-color="#9F7A33"/>
      <stop offset="100%" stop-color="#C49A3C"/>
    </linearGradient>
    <linearGradient id="goldLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8C96A"/>
      <stop offset="100%" stop-color="#C49A3C"/>
    </linearGradient>
    <linearGradient id="navyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#213F99"/>
      <stop offset="100%" stop-color="#1a3380"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#9F7A33" flood-opacity="0.25"/>
    </filter>
    <filter id="glowGold">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#C49A3C" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- ===== SOBRE CENTRAL (grande) ===== -->
  <g transform="translate(160,145)" filter="url(#softShadow)">
    <!-- Cuerpo del sobre -->
    <rect x="-58" y="-38" width="116" height="76" rx="5" fill="url(#navyGrad)" stroke="url(#goldMain)" stroke-width="1.5"/>
    <!-- Solapa superior (triángulo) -->
    <path d="M -58,-38 L 0,-4 L 58,-38 Z" fill="#1a3380" stroke="url(#goldMain)" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- Línea diagonal izquierda -->
    <line x1="-58" y1="38" x2="0" y2="4" stroke="url(#goldMain)" stroke-width="1"/>
    <!-- Línea diagonal derecha -->
    <line x1="58" y1="38" x2="0" y2="4" stroke="url(#goldMain)" stroke-width="1"/>
    <!-- Sello central: corazón dorado -->
    <g transform="translate(0, 6)">
      <path d="M0,-8 C-2,-12 -9,-12 -9,-5 C-9,0 0,8 0,8 C0,8 9,0 9,-5 C9,-12 2,-12 0,-8 Z"
            fill="url(#goldMain)" filter="url(#glowGold)"/>
    </g>
    <!-- Detalle ornamental en esquinas -->
    <circle cx="-52" cy="-32" r="2" fill="#C49A3C" opacity="0.6"/>
    <circle cx="52" cy="-32" r="2" fill="#C49A3C" opacity="0.6"/>
    <circle cx="-52" cy="32" r="2" fill="#C49A3C" opacity="0.6"/>
    <circle cx="52" cy="32" r="2" fill="#C49A3C" opacity="0.6"/>
  </g>

  <!-- ===== SOBRE IZQUIERDO (mediano, inclinado) ===== -->
  <g transform="translate(78,118) rotate(-18)" opacity="0.88" filter="url(#softShadow)">
    <rect x="-36" y="-24" width="72" height="48" rx="4" fill="url(#navyGrad)" stroke="url(#goldLight)" stroke-width="1.2"/>
    <path d="M -36,-24 L 0,-4 L 36,-24 Z" fill="#1a3380" stroke="url(#goldLight)" stroke-width="1.2"/>
    <line x1="-36" y1="24" x2="0" y2="4" stroke="url(#goldLight)" stroke-width="0.8"/>
    <line x1="36" y1="24" x2="0" y2="4" stroke="url(#goldLight)" stroke-width="0.8"/>
    <circle cx="0" cy="8" r="5" fill="none" stroke="url(#goldMain)" stroke-width="1"/>
    <circle cx="0" cy="8" r="2" fill="url(#goldMain)"/>
  </g>

  <!-- ===== SOBRE DERECHO (mediano, inclinado) ===== -->
  <g transform="translate(242,112) rotate(16)" opacity="0.88" filter="url(#softShadow)">
    <rect x="-36" y="-24" width="72" height="48" rx="4" fill="url(#navyGrad)" stroke="url(#goldLight)" stroke-width="1.2"/>
    <path d="M -36,-24 L 0,-4 L 36,-24 Z" fill="#1a3380" stroke="url(#goldLight)" stroke-width="1.2"/>
    <line x1="-36" y1="24" x2="0" y2="4" stroke="url(#goldLight)" stroke-width="0.8"/>
    <line x1="36" y1="24" x2="0" y2="4" stroke="url(#goldLight)" stroke-width="0.8"/>
    <circle cx="0" cy="8" r="5" fill="none" stroke="url(#goldMain)" stroke-width="1"/>
    <circle cx="0" cy="8" r="2" fill="url(#goldMain)"/>
  </g>

  <!-- ===== SOBRE PEQUEÑO ARRIBA IZQUIERDA ===== -->
  <g transform="translate(52,70) rotate(-28)" opacity="0.65">
    <rect x="-22" y="-15" width="44" height="30" rx="3" fill="#213F99" stroke="#C49A3C" stroke-width="1"/>
    <path d="M -22,-15 L 0,-3 L 22,-15 Z" fill="#1a3380" stroke="#C49A3C" stroke-width="1"/>
  </g>

  <!-- ===== SOBRE PEQUEÑO ARRIBA DERECHA ===== -->
  <g transform="translate(270,65) rotate(24)" opacity="0.65">
    <rect x="-22" y="-15" width="44" height="30" rx="3" fill="#213F99" stroke="#C49A3C" stroke-width="1"/>
    <path d="M -22,-15 L 0,-3 L 22,-15 Z" fill="#1a3380" stroke="#C49A3C" stroke-width="1"/>
  </g>

  <!-- ===== BILLETES / MONEDAS cayendo ===== -->
  <!-- Moneda 1 -->
  <g transform="translate(105,54) rotate(-12)" opacity="0.8">
    <ellipse cx="0" cy="0" rx="14" ry="14" fill="url(#goldMain)" stroke="#E8C96A" stroke-width="1"/>
    <ellipse cx="0" cy="0" rx="10" ry="10" fill="none" stroke="#E8C96A" stroke-width="0.8"/>
    <text x="0" y="4" text-anchor="middle" font-size="9" font-weight="bold" fill="#fff" font-family="serif">$</text>
  </g>
  <!-- Moneda 2 -->
  <g transform="translate(215,48) rotate(15)" opacity="0.8">
    <ellipse cx="0" cy="0" rx="12" ry="12" fill="url(#goldMain)" stroke="#E8C96A" stroke-width="1"/>
    <ellipse cx="0" cy="0" rx="8" ry="8" fill="none" stroke="#E8C96A" stroke-width="0.8"/>
    <text x="0" y="4" text-anchor="middle" font-size="8" font-weight="bold" fill="#fff" font-family="serif">$</text>
  </g>
  <!-- Moneda 3 pequeña -->
  <g transform="translate(155,32) rotate(5)" opacity="0.6">
    <ellipse cx="0" cy="0" rx="9" ry="9" fill="url(#goldLight)" stroke="#E8C96A" stroke-width="0.8"/>
    <text x="0" y="3" text-anchor="middle" font-size="6" font-weight="bold" fill="#fff" font-family="serif">$</text>
  </g>

  <!-- ===== DESTELLOS / SPARKLES ===== -->
  <!-- Sparkle grande izquierda -->
  <g transform="translate(28,140)" fill="#C49A3C" opacity="0.7">
    <path d="M0,-10 L1.5,-1.5 L10,0 L1.5,1.5 L0,10 L-1.5,1.5 L-10,0 L-1.5,-1.5 Z"/>
  </g>
  <!-- Sparkle grande derecha -->
  <g transform="translate(292,155)" fill="#C49A3C" opacity="0.7">
    <path d="M0,-10 L1.5,-1.5 L10,0 L1.5,1.5 L0,10 L-1.5,1.5 L-10,0 L-1.5,-1.5 Z"/>
  </g>
  <!-- Sparkles pequeños -->
  <g fill="#E8C96A" opacity="0.5">
    <path transform="translate(135,25)" d="M0,-6 L0.9,-0.9 L6,0 L0.9,0.9 L0,6 L-0.9,0.9 L-6,0 L-0.9,-0.9 Z"/>
    <path transform="translate(185,22)" d="M0,-5 L0.8,-0.8 L5,0 L0.8,0.8 L0,5 L-0.8,0.8 L-5,0 L-0.8,-0.8 Z"/>
    <path transform="translate(40,190)" d="M0,-5 L0.8,-0.8 L5,0 L0.8,0.8 L0,5 L-0.8,0.8 L-5,0 L-0.8,-0.8 Z"/>
    <path transform="translate(280,200)" d="M0,-5 L0.8,-0.8 L5,0 L0.8,0.8 L0,5 L-0.8,0.8 L-5,0 L-0.8,-0.8 Z"/>
    <path transform="translate(160,258)" d="M0,-5 L0.8,-0.8 L5,0 L0.8,0.8 L0,5 L-0.8,0.8 L-5,0 L-0.8,-0.8 Z"/>
  </g>

  <!-- ===== LÍNEAS ORNAMENTALES ABAJO ===== -->
  <g transform="translate(160,240)">
    <line x1="-70" y1="0" x2="-12" y2="0" stroke="url(#goldMain)" stroke-width="0.8" opacity="0.7"/>
    <path d="M-8,0 C-5,-4 5,-4 8,0 C5,4 -5,4 -8,0 Z" fill="url(#goldMain)" opacity="0.8"/>
    <line x1="12" y1="0" x2="70" y2="0" stroke="url(#goldMain)" stroke-width="0.8" opacity="0.7"/>
    <circle cx="-72" cy="0" r="2" fill="#C49A3C" opacity="0.6"/>
    <circle cx="72" cy="0" r="2" fill="#C49A3C" opacity="0.6"/>
  </g>

  <!-- ===== PUNTOS DE LLUVIA (pequeñas gotas) ===== -->
  <g fill="#C49A3C" opacity="0.3">
    <ellipse cx="88" cy="32" rx="2" ry="4" transform="rotate(-10,88,32)"/>
    <ellipse cx="232" cy="28" rx="2" ry="4" transform="rotate(10,232,28)"/>
    <ellipse cx="35" cy="100" rx="1.5" ry="3" transform="rotate(-15,35,100)"/>
    <ellipse cx="286" cy="95" rx="1.5" ry="3" transform="rotate(15,286,95)"/>
    <ellipse cx="310" cy="130" rx="1.5" ry="3" transform="rotate(8,310,130)"/>
    <ellipse cx="12" cy="165" rx="1.5" ry="3" transform="rotate(-8,12,165)"/>
  </g>
</svg>
